name: CI/CD Frontdesk

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: frontdesk-production
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: [self-hosted, windows, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy to Production
    runs-on: [self-hosted, windows, x64]
    needs: ci
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy app in production directory
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $prodDir = "C:\pa-penajam\frontdesk-new"

          Set-Location $prodDir
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          if (-not (Test-Path ".env")) {
            if (-not $env:ADMIN_PASSWORD_HASH) {
              throw "Missing ADMIN_PASSWORD_HASH secret for first deployment."
            }
            Set-Content -Path ".env" -Value "ADMIN_PASSWORD_HASH=$($env:ADMIN_PASSWORD_HASH)"
          }

          # PM2 persists process env across restarts. Clear the deploy-step secret so
          # the runtime process reads ADMIN_PASSWORD_HASH from .env instead.
          Remove-Item Env:ADMIN_PASSWORD_HASH -ErrorAction SilentlyContinue

          if (Test-Path ".next") {
            Remove-Item ".next" -Recurse -Force
          }

          pnpm install --frozen-lockfile
          pnpm build

          $existingApp = pm2 jlist | ConvertFrom-Json | Where-Object { $_.name -eq "frontdesk-new" }
          if ($existingApp) {
            pm2 delete frontdesk-new
          }

          pm2 start ecosystem.config.cjs --only frontdesk-new --time
          pm2 save

          $resp = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:3003" -TimeoutSec 20
          if ($resp.StatusCode -ne 200) {
            throw "Health check failed. Expected HTTP 200, got $($resp.StatusCode)"
          }
        env:
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
